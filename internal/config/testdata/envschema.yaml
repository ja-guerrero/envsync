version: 1

project:
  name: my-app

vars:
  DATABASE_URL:
    type: string
    required: true
    secret: true
    description: "Postgres connection string"
  PORT:
    type: number
    default: "8080"
    min: 1024
    max: 65535
  LOG_LEVEL:
    type: string
    enum: [debug, info, warn, error]
    default: "info"

environments:
  production:
    backend: vault
  staging:
    backend: vault
